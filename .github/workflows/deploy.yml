name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: バックエンドDockerイメージをビルド → ECRにプッシュ
  # ──────────────────────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: raisechat-backend
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build \
            --file apps/backend/Dockerfile.prod \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ──────────────────────────────────────────────────────────────
  # Job 2: フロントエンドDockerイメージをビルド → ECRにプッシュ
  # ──────────────────────────────────────────────────────────────
  build-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Fetch ALB URL from SSM for build arg
        id: alb-url
        run: |
          ALB_URL=$(aws ssm get-parameter \
            --name "/raisechat/prod/NEXT_PUBLIC_API_URL" \
            --query 'Parameter.Value' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "value=$ALB_URL" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: raisechat-frontend
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          NEXT_PUBLIC_API_URL: ${{ steps.alb-url.outputs.value }}
        run: |
          docker build \
            --file apps/frontend/Dockerfile.prod \
            --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ──────────────────────────────────────────────────────────────
  # Job 3: EC2にSSM経由でデプロイ（Job 1 & 2 の完了を待って実行）
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "set -euo pipefail",
              "aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin $(aws sts get-caller-identity --query Account --output text).dkr.ecr.ap-northeast-1.amazonaws.com",
              "/app/fetch-env.sh",
              "cd /app && docker compose -f docker-compose.prod.yml pull",
              "docker compose -f docker-compose.prod.yml up -d --remove-orphans",
              "cd /app && docker compose -f docker-compose.prod.yml exec -T backend /app/apps/backend/node_modules/.bin/prisma migrate deploy --schema /app/prisma/schema.prisma"
            ]}' \
            --region "${{ env.AWS_REGION }}" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # デプロイ完了まで待機（最大10分）
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --cli-read-timeout 600

          # 実行結果を確認
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'StatusDetails' \
            --output text)
          echo "Deploy status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1
