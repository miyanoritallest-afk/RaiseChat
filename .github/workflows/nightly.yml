name: Nightly

on:
  schedule:
    # 毎日 UTC 15:00 (JST 00:00) に実行
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  integration-test:
    name: Backend — Integration tests (real DB)
    runs-on: ubuntu-latest
    # A-4実装後に有効化
    if: false
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: raisechat_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema ../../prisma/schema.prisma

      - name: Run migrations on test DB
        run: npx prisma migrate deploy --schema ../../prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/raisechat_test

      - name: Run integration tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/raisechat_test
          JWT_SECRET: nightly-ci-test-secret

  e2e-test:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    # A-6実装後に有効化
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (root)
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/frontend

      - name: Start backend
        run: npm run start:prod &
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Start frontend
        run: npx vite preview &
        working-directory: apps/frontend

      - name: Wait for services
        run: sleep 10

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        working-directory: apps/frontend

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7

  performance-test:
    name: Performance tests (k6 smoke)
    runs-on: ubuntu-latest
    # A-7実装後に有効化
    if: false
    steps:
      - uses: actions/checkout@v4

      - name: Run k6 smoke test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/smoke.js
        env:
          BASE_URL: ${{ secrets.TEST_BASE_URL }}
          TEST_USERNAME: ${{ secrets.K6_TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.K6_TEST_PASSWORD }}

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6/results/
          retention-days: 7
