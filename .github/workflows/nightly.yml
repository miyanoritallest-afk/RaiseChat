name: Nightly

on:
  schedule:
    # 毎日 UTC 15:00 (JST 00:00) に実行
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  integration-test:
    name: Backend — Integration tests (real DB)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: raisechat_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema ../../prisma/schema.prisma

      - name: Run migrations on test DB
        run: npx prisma migrate deploy --schema ../../prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/raisechat_test

      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/raisechat_test
          JWT_SECRET: nightly-ci-test-secret

  e2e-test:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: raisechat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: apps/backend

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: apps/frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/frontend

      - name: Generate Prisma client
        run: npx prisma generate --schema ../../prisma/schema.prisma
        working-directory: apps/backend

      - name: Run DB migrations
        run: npx prisma migrate deploy --schema ../../prisma/schema.prisma
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/raisechat_test

      - name: Build backend
        run: npm run build
        working-directory: apps/backend

      - name: Start backend
        run: npm run start:prod &
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/raisechat_test
          JWT_SECRET: nightly-ci-test-secret
          PORT: 4000
          FRONTEND_URL: http://localhost:3000
          AWS_REGION: ap-northeast-1
          AWS_S3_BUCKET_NAME: ci-dummy-bucket

      - name: Build frontend
        run: npm run build
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Start frontend
        run: npm run start &
        working-directory: apps/frontend
        env:
          PORT: 3000

      - name: Wait for services to be ready
        run: npx wait-on http://localhost:4000/api/health http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --project=realtime
        working-directory: apps/frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
          API_BASE_URL: http://localhost:4000/api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7

  performance-test:
    name: Performance tests (k6 smoke)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: raisechat_perf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci
        working-directory: apps/backend

      - name: Generate Prisma client
        run: npx prisma generate --schema ../../prisma/schema.prisma
        working-directory: apps/backend

      - name: Run DB migrations
        run: npx prisma migrate deploy --schema ../../prisma/schema.prisma
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/raisechat_perf

      - name: Build backend
        run: npm run build
        working-directory: apps/backend

      - name: Start backend
        run: npm run start:prod &
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/raisechat_perf
          JWT_SECRET: nightly-ci-test-secret
          PORT: 4000
          FRONTEND_URL: http://localhost:3000
          AWS_REGION: ap-northeast-1
          AWS_S3_BUCKET_NAME: ci-dummy-bucket

      - name: Wait for backend to be ready
        run: npx wait-on http://localhost:4000/api/health --timeout 30000
        working-directory: apps/backend

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 smoke test
        run: mkdir -p k6/results && k6 run --out json=k6/results/smoke.json k6/smoke.js
        env:
          BASE_URL: http://localhost:4000/api

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6/results/
          retention-days: 7
